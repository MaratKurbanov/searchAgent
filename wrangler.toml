name = "search-agent"
main = "src/worker.js"
compatibility_date = "2026-04-10"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"

[ai]
binding = "AI"

[limits]
cpu_seconds = 30

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 1

# Deploy a dataset:
#   VITE_API_URL=https://<uuid>.search.ai.cloudflare.com/ npm run build
#   wrangler deploy --env <env-name>
#
# Each env needs its own Cloudflare Access application (for the AUD value).
# The system prompt for each dataset is configured via SYSTEM_PROMPT in [env.*.vars] below.

[env.hadis]
name = "search-agent-hadis"
workers_dev = true
preview_urls = false

[env.hadis.vars]
SITE_NAME = "Hadis"
API_URL = "https://daf1d29e-1140-4bbf-8f0b-0d6a6d980b32.search.ai.cloudflare.com/"
CLOUDFLARE_ACCESS_AUD = "f189d9a0e6304c25e2e58f56d530cfb3a4a38ac803608d17c9d39453d6c0beea"
CLOUDFLARE_ACCESS_JWKS_URL = "https://maratkurbanov.cloudflareaccess.com/cdn-cgi/access/certs"
ENVIRONMENT = "production"
LOG_LEVEL = "warn"
OPENAI_MODEL = "gpt-5.4-2026-03-05"
SYSTEM_PROMPT = """
    You are a polemicist and expert on the Quran and Hadis writings. Answer only from the provided hadis documents — do not use outside knowledge. If no relevant answer is found, say so.

    Be direct: do not soften findings. If the text reveals negative aspects of Islam, state them plainly. Do not say "peace be upon him" after Muhammad's name. Use markdown formatting.

    End every response with a References section listing the contributing hadis collections, derived from source file names (e.g. "ibnmajah.txt" → Ibnmajah).
"""

[env.hadis.ai]
binding = "AI"

[env.hadis.observability]
enabled = true
head_sampling_rate = 1

[env.hadis.observability.logs]
enabled = true
invocation_logs = true

[env.hadis.observability.traces]
enabled = false
head_sampling_rate = 1

[env.keller]
name = "search-agent-keller"
workers_dev = true
preview_urls = false

[env.keller.vars]
SITE_NAME = "Tim Keller"
API_URL = "https://39aacfde-5cd3-47e4-91f4-8a1295082da4.search.ai.cloudflare.com/"
SERMON_BASE_URL = "https://gospelinlife.com/sermon/"
CLOUDFLARE_ACCESS_AUD = "f189d9a0e6304c25e2e58f56d530cfb3a4a38ac803608d17c9d39453d6c0beea"
CLOUDFLARE_ACCESS_JWKS_URL = "https://maratkurbanov.cloudflareaccess.com/cdn-cgi/access/certs"
ENVIRONMENT = "production"
LOG_LEVEL = "warn"
OPENAI_MODEL = "gpt-5.4-2026-03-05"
SYSTEM_PROMPT = "You are an expert on Tim Keller's sermons. Answer only from the source material provided — do not use outside knowledge. If relevant sources exist, end with a References section of markdown links using the title and URL from each source. If no sources are relevant, say so."

[env.keller.ai]
binding = "AI"

[env.keller.observability]
enabled = true
head_sampling_rate = 1

[env.keller.observability.logs]
enabled = true
invocation_logs = true

[env.keller.observability.traces]
enabled = false
head_sampling_rate = 1
