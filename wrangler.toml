name = "search-agent"
main = "src/worker.js"
compatibility_date = "2026-04-10"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"

[ai]
binding = "AI"

[limits]
cpu_seconds = 30

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 1

# Deploy a dataset:
#   VITE_API_URL=https://<uuid>.search.ai.cloudflare.com/ npm run build
#   wrangler deploy --env <env-name>
#
# Each env needs its own Cloudflare Access application (for the AUD value).
# The system prompt for each dataset is configured in the AI Search dashboard.

[env.hadis]
name = "search-agent-hadis"
workers_dev = true
preview_urls = false
vars = { API_URL = "https://daf1d29e-1140-4bbf-8f0b-0d6a6d980b32.search.ai.cloudflare.com/", CLOUDFLARE_ACCESS_AUD = "f189d9a0e6304c25e2e58f56d530cfb3a4a38ac803608d17c9d39453d6c0beea", CLOUDFLARE_ACCESS_JWKS_URL = "https://maratkurbanov.cloudflareaccess.com/cdn-cgi/access/certs", ENVIRONMENT = "production", LOG_LEVEL = "warn" }

[env.hadis.ai]
binding = "AI"

[env.hadis.observability]
enabled = true
head_sampling_rate = 1

[env.hadis.observability.logs]
enabled = true
invocation_logs = true

[env.hadis.observability.traces]
enabled = false
head_sampling_rate = 1

[env.keller]
name = "search-agent-keller"
workers_dev = true
preview_urls = false
vars = { API_URL = "<keller-ai-search-url>", CLOUDFLARE_ACCESS_AUD = "<keller-aud>", CLOUDFLARE_ACCESS_JWKS_URL = "https://maratkurbanov.cloudflareaccess.com/cdn-cgi/access/certs", ENVIRONMENT = "production", LOG_LEVEL = "warn" }

[env.keller.ai]
binding = "AI"

[env.keller.observability]
enabled = true
head_sampling_rate = 1

[env.keller.observability.logs]
enabled = true
invocation_logs = true

[env.keller.observability.traces]
enabled = false
head_sampling_rate = 1
